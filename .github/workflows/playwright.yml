name: Playwright Tests

on:
  push:
    branches: [ main, master, dev ]
  pull_request:
    branches: [ main, master, dev ]

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    # Настройка Python для Backend
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install Python dependencies
      working-directory: ./backend
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    # Запуск Backend
    - name: Start Backend
      working-directory: ./backend
      run: |
        echo "Initializing database..."
        python seed_db.py
        echo "Database initialized"
        ls -la data/
        echo "Starting backend server..."
        python -m uvicorn main:app --port 5001 &
        sleep 5
        
    # Проверка доступности Backend
    - name: Check Backend
      run: |
        echo "Waiting for backend to be ready..."
        timeout 30 bash -c 'until curl -s http://localhost:5001/docs > /dev/null; do sleep 1; done'
        echo "Backend is ready!"
        curl -s http://localhost:5001/docs | head -n 20
    
    # Настройка Node.js для Frontend
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    
    - name: Install Frontend dependencies
      working-directory: ./frontend
      run: npm ci
    
    # Запуск Frontend
    - name: Start Frontend
      working-directory: ./frontend
      run: |
        npm install -g wait-on
        npm run dev &
        echo "Waiting for frontend to start..."
        wait-on http://localhost:5173 --timeout 60000
        echo "Frontend is ready"
        
    # Проверка доступности серверов
    - name: Verify Servers
      run: |
        echo "Checking Backend..."
        curl -f http://localhost:5001/docs || exit 1
        echo "Checking Frontend..."
        curl -f http://localhost:5173 || exit 1
        echo "All servers are running!"
    
    # Установка Playwright
    - name: Install Playwright Browsers
      working-directory: ./frontend
      run: npx playwright install --with-deps chromium
    
    # Запуск тестов
    - name: Run Playwright tests
      working-directory: ./frontend
      run: |
        echo "Node version: $(node --version)"
        echo "NPM version: $(npm --version)"
        echo "Playwright version: $(npx playwright --version)"
        echo "Starting Playwright tests..."
        npx playwright test --project=chromium --reporter=list,html
        echo "Tests completed!"
    
    # Загрузка отчётов при падении
    - uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: frontend/playwright-report/
        retention-days: 30
    
    # Загрузка скриншотов и видео при падении
    - uses: actions/upload-artifact@v4
      if: failure()
      with:
        name: test-results
        path: frontend/test-results/
        retention-days: 7
