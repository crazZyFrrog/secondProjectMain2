name: Playwright Tests

on:
  push:
    branches: [ main, master, dev ]
  pull_request:
    branches: [ main, master, dev ]

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    # Настройка Python для Backend
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install Python dependencies
      working-directory: ./backend
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    # Запуск Backend
    - name: Start Backend
      working-directory: ./backend
      run: |
        echo "=== Initializing database ==="
        python seed_db.py 2>&1 | tee seed_output.log
        echo ""
        echo "=== Database initialization complete ==="
        echo "Database file check:"
        ls -la data/
        if [ -f "data/app.db" ]; then
          echo "✓ app.db exists"
          echo "Database size: $(du -h data/app.db)"
        else
          echo "✗ app.db NOT FOUND!"
          exit 1
        fi
        echo ""
        echo "=== Starting backend server ==="
        nohup python -m uvicorn main:app --port 5001 > backend.log 2>&1 &
        echo "Backend PID: $!"
        sleep 8
        echo ""
        echo "=== Backend logs (first 50 lines) ==="
        head -n 50 backend.log || echo "No logs yet"
        
    # Проверка доступности Backend
    - name: Check Backend
      working-directory: ./backend
      run: |
        echo "=== Waiting for backend to be ready ==="
        timeout 30 bash -c 'until curl -s http://localhost:5001/docs > /dev/null; do echo "Waiting..."; sleep 2; done'
        echo "✓ Backend is responding!"
        echo ""
        echo "=== Backend logs (updated) ==="
        tail -n 100 backend.log
        echo ""
        echo "=== Testing API endpoints ==="
        
        # Test 1: Health check
        echo "1. Testing /docs endpoint..."
        curl -s http://localhost:5001/docs | head -n 5
        
        # Test 2: Login with test user
        echo ""
        echo "2. Testing /api/auth/login endpoint..."
        LOGIN_RESPONSE=$(curl -s -X POST http://localhost:5001/api/auth/login \
          -H "Content-Type: application/json" \
          -d '{"email":"testforexample@example.com","password":"password1234"}')
        echo "Response: $LOGIN_RESPONSE"
        
        if echo "$LOGIN_RESPONSE" | grep -q "error\|Error\|500"; then
          echo "✗ Login endpoint returned an error!"
          echo "Full backend logs:"
          cat backend.log
          exit 1
        else
          echo "✓ Login endpoint works!"
        fi
        
        # Test 3: Check if test user exists
        echo ""
        echo "3. Checking database for test user..."
        python -c "
import sqlite3
conn = sqlite3.connect('data/app.db')
cursor = conn.cursor()
cursor.execute('SELECT email, username, role FROM clients WHERE email = ?', ('testforexample@example.com',))
user = cursor.fetchone()
if user:
    print(f'✓ Test user found: {user}')
else:
    print('✗ Test user NOT found in database!')
    cursor.execute('SELECT email FROM clients LIMIT 5')
    print('Available users:', cursor.fetchall())
conn.close()
"
    
    # Настройка Node.js для Frontend
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    
    - name: Install Frontend dependencies
      working-directory: ./frontend
      run: npm ci
    
    # Запуск Frontend
    - name: Start Frontend
      working-directory: ./frontend
      run: |
        npm install -g wait-on
        npm run dev &
        echo "Waiting for frontend to start..."
        wait-on http://localhost:5173 --timeout 60000
        echo "Frontend is ready"
        
    # Проверка доступности серверов
    - name: Verify Servers
      run: |
        echo "=== Final Server Verification ==="
        echo "1. Backend health check..."
        if curl -f -s http://localhost:5001/docs > /dev/null; then
          echo "✓ Backend OK"
        else
          echo "✗ Backend FAILED"
          cat backend/backend.log
          exit 1
        fi
        
        echo "2. Frontend health check..."
        if curl -f -s http://localhost:5173 > /dev/null; then
          echo "✓ Frontend OK"
        else
          echo "✗ Frontend FAILED"
          exit 1
        fi
        
        echo ""
        echo "✓ All servers are ready for tests!"
    
    # Установка Playwright
    - name: Install Playwright Browsers
      working-directory: ./frontend
      run: npx playwright install --with-deps chromium
    
    # Запуск тестов
    - name: Run Playwright tests
      working-directory: ./frontend
      run: |
        echo "=== Environment Info ==="
        echo "Node: $(node --version)"
        echo "NPM: $(npm --version)"
        echo "Playwright: $(npx playwright --version)"
        echo "Working directory: $(pwd)"
        echo ""
        echo "=== Starting Playwright tests ==="
        npx playwright test --project=chromium --reporter=list,html || {
          echo ""
          echo "=== Tests failed! Checking backend logs ==="
          tail -n 200 ../backend/backend.log
          exit 1
        }
        echo ""
        echo "✓ All tests passed!"
    
    # Загрузка отчётов при падении
    - uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: frontend/playwright-report/
        retention-days: 30
    
    # Загрузка скриншотов и видео при падении
    - uses: actions/upload-artifact@v4
      if: failure()
      with:
        name: test-results
        path: frontend/test-results/
        retention-days: 7
