name: Test Workflow

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Echo test
      run: |
        echo "GitHub Actions is working!"
        echo "Current directory: $(pwd)"
        echo "Files in .github/workflows:"
        ls -la .github/workflows/
