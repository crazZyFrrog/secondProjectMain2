# =============================================================================
# Nginx reverse proxy: myfirstproject.su → Vercel
# Файл: /etc/nginx/sites-available/myfirstproject.conf
#
# Зависимости: nginx >= 1.18, certbot с плагином nginx
# После установки: ln -s /etc/nginx/sites-available/myfirstproject.conf \
#                          /etc/nginx/sites-enabled/
# =============================================================================

# Кэш для DNS-резолюции Vercel (важно: Vercel — anycast, IP может меняться)
resolver 1.1.1.1 8.8.8.8 valid=300s;
resolver_timeout 5s;

# ─────────────────────────────────────────────────────────────────────────────
# Upstream: ваш Vercel-проект
# Замените YOUR_PROJECT.vercel.app на реальный *.vercel.app URL проекта
# ─────────────────────────────────────────────────────────────────────────────
upstream vercel_backend {
    server YOUR_PROJECT.vercel.app:443;
    keepalive 32;
}

# ─────────────────────────────────────────────────────────────────────────────
# HTTP → HTTPS редирект для apex и www
# ─────────────────────────────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name myfirstproject.su www.myfirstproject.su;

    # Certbot будет добавлять сюда challenge-блок автоматически
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ─────────────────────────────────────────────────────────────────────────────
# HTTPS: apex → www (canonical redirect)
# ─────────────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name myfirstproject.su;

    ssl_certificate     /etc/letsencrypt/live/myfirstproject.su/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/myfirstproject.su/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://www.myfirstproject.su$request_uri;
}

# ─────────────────────────────────────────────────────────────────────────────
# HTTPS: основной прокси www → Vercel
# ─────────────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name www.myfirstproject.su;

    ssl_certificate     /etc/letsencrypt/live/myfirstproject.su/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/myfirstproject.su/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options    "nosniff"                              always;
    add_header X-Frame-Options           "SAMEORIGIN"                           always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"      always;

    # Gzip (Vercel обычно отдаёт сжатое, но на всякий случай)
    gzip            on;
    gzip_proxied    any;
    gzip_types      text/plain text/css application/json application/javascript text/xml application/xml;

    location / {
        # Vercel требует правильный Host-заголовок — иначе 404/403
        proxy_pass              https://YOUR_PROJECT.vercel.app;
        proxy_ssl_server_name   on;
        proxy_ssl_name          YOUR_PROJECT.vercel.app;
        proxy_set_header        Host              YOUR_PROJECT.vercel.app;
        proxy_set_header        X-Real-IP         $remote_addr;
        proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto $scheme;

        # Таймауты
        proxy_connect_timeout   10s;
        proxy_send_timeout      60s;
        proxy_read_timeout      60s;

        # Буферизация — отключаем для стриминга (SSE / WebSocket если понадобится)
        proxy_buffering         off;

        # HTTP/1.1 для keepalive к Vercel
        proxy_http_version      1.1;
        proxy_set_header        Connection "";

        # Кэшируем статику по Cache-Control от Vercel
        proxy_cache_valid        200 1d;
        add_header               X-Proxy-Cache $upstream_cache_status;
    }

    # Статические assets (хэшированные имена — можно кэшировать агрессивно)
    location /assets/ {
        proxy_pass              https://YOUR_PROJECT.vercel.app;
        proxy_ssl_server_name   on;
        proxy_ssl_name          YOUR_PROJECT.vercel.app;
        proxy_set_header        Host              YOUR_PROJECT.vercel.app;

        expires                 1y;
        add_header              Cache-Control "public, max-age=31536000, immutable";
        proxy_cache_valid        200 1y;
        proxy_buffering          on;
        proxy_buffer_size        16k;
        proxy_buffers            8 16k;
    }
}
