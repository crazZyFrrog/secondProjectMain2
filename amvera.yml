meta:
  environment: python
  toolchain:
    name: pip
    version: "3.11"
build:
  requirementsPath: backend/requirements.txt
  useCache: true
run:
  scriptName: null
  command: bash -c "cd backend && python -m uvicorn main:app --host 0.0.0.0 --port 8000"
  persistenceMount: /data
  containerPort: "8000"
  servicePort: "80"
